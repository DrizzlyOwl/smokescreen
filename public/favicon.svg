<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- CRT Screen -->
  <rect width="100" height="100" rx="15" fill="#0d110d" stroke="#18ff62" stroke-width="2"/>
  
  <!-- Terminal Prompt -->
  <text x="50" y="65" font-family="'Courier New', Courier, monospace" font-size="60" fill="#18ff62" text-anchor="middle" font-weight="900" filter="url(#glow)">&gt;</text>
  
  <!-- Blinking Cursor (Stateless representation) -->
  <rect x="70" y="35" width="10" height="35" fill="#18ff62" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1s" repeatCount="indefinite" />
  </rect>

  <!-- Scanline -->
  <line x1="0" y1="50" x2="100" y2="50" stroke="black" stroke-opacity="0.1" stroke-width="2" />
</svg>
